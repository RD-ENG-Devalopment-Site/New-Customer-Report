<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>บันทึกข้อมูล</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#172b4d;font:14px Arial,"Noto Sans Thai",sans-serif}.app{min-height:100vh;display:flex}.side{width:276px;background:#172f63;padding:28px 20px;color:#fff}.brand{display:flex;gap:10px;align-items:center;margin:0 9px 42px;font-weight:bold}.logo{display:grid;place-items:center;width:40px;height:40px;border-radius:12px;background:#58a6ff;font-size:22px}.nav{display:grid;gap:9px}.nav a{padding:14px 16px;border-radius:11px;text-decoration:none;color:#cad7f5;font-weight:bold}.nav a.active,.nav a:hover{background:#304d88;color:#fff}.main{width:100%;padding:40px 52px}.back{color:#3975c9;text-decoration:none}.heading h1{margin:14px 0 5px}.heading p{margin:0 0 22px;color:#7e91b2}.card{background:#fff;border:1px solid #e7edf5;border-radius:16px;padding:26px;box-shadow:0 8px 24px #29456b0a}.card-head{display:flex;justify-content:space-between;gap:16px}.card h2{margin:0}.card p{margin:6px 0;color:#7e91b2}.sheet{color:#2563eb;text-decoration:none}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px;margin-top:20px}.field{display:grid;gap:7px;color:#52657f}.field span{font-weight:bold}.field i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;background:var(--c)}.field input{border:1px solid #dce5f0;border-radius:9px;padding:11px;color:#172b4d;font:15px Arial}.blue{--c:#2563eb}.purple{--c:#a855f7}.cyan{--c:#38bdf8}.amber{--c:#f59e0b}.green{--c:#10b981}.pink{--c:#fb7185}.actions{display:flex;align-items:center;gap:12px;margin-top:20px}.btn{border:0;border-radius:9px;background:#2563eb;color:#fff;padding:11px 17px;font-weight:bold;cursor:pointer}.status{color:#71819a;font-size:12px}@media(max-width:800px){.side{display:none}.main{padding:24px 16px}.grid{grid-template-columns:1fr 1fr}}@media(max-width:480px){.grid{grid-template-columns:1fr}}</style></head>
<body><script src="remote-store.js"></script><div class="app"><aside class="side"><div class="brand"><span class="logo">S</span><span>สรุปผู้มุ่งหวังใหม่</span></div><nav class="nav"><a href="index.html">▦ ภาพรวม</a><a class="active" href="data-entry.html">▣ บันทึกข้อมูล</a><a href="edit-data.html">✎ แก้ไขข้อมูล</a></nav></aside><main class="main"><a class="back" href="index.html">← กลับหน้าสรุป</a><div class="heading"><h1>บันทึกข้อมูล</h1><p>กรอกจำนวนคนรายวันเพื่อแสดงบน Dashboard</p></div><section class="card"><div class="card-head"><div><h2>ผลการติดตามรายวัน</h2><p>บันทึกเฉพาะข้อมูลที่ใช้ในกราฟ</p></div><a class="sheet" href="https://docs.google.com/spreadsheets/d/1LtQC2c3QxX5NLxXOc-4UpAweNOTqlkKGGZ9ZFFmqIJc/edit" target="_blank" rel="noopener">เปิด Google Sheet ↗</a></div><form id="form"><div class="grid"><label class="field blue"><span><i></i>แพลนเป้าหมาย</span><input name="planTarget" type="number" min="0" value="0" required></label><label class="field"><span>วันที่บันทึก</span><input name="date" type="date" required></label><label class="field purple"><span><i></i>ผู้มุ่งหวังเดิม</span><input name="old" type="number" min="0" value="0" required></label><label class="field cyan"><span><i></i>ผู้มุ่งหวังใหม่</span><input name="newProspect" type="number" min="0" value="0" required></label><label class="field amber"><span><i></i>รอติดตาม</span><input name="waiting" type="number" min="0" value="0" required></label><label class="field green"><span><i></i>ปิดการติดตาม</span><input name="closed" type="number" min="0" value="0" required></label><label class="field pink"><span><i></i>ยังไม่ปิด</span><input name="notClosed" type="number" min="0" value="0" required></label></div><div class="actions"><button class="btn" type="submit">บันทึกผลรายวัน</button><span class="status" id="status">พร้อมบันทึกและเชื่อมต่อ Google Sheets</span></div></form></section></main></div><script>const form=document.querySelector('#form'),keys=['planTarget','old','newProspect','waiting','closed','notClosed'];form.elements.date.value=new Date().toISOString().slice(0,10);form.addEventListener('submit',async e=>{e.preventDefault();const row=Object.fromEntries(new FormData(form));keys.forEach(k=>row[k]=Math.max(0,Number(row[k])||0));const rows=JSON.parse(localStorage.getItem('sales-flow-records')||'[]').filter(item=>item.date!==row.date);rows.push(row);localStorage.setItem('sales-flow-records',JSON.stringify(rows));try{await window.salesFlowRemote.save(row);document.querySelector('#status').textContent='บันทึกและส่งไป Google Sheets แล้ว'}catch{document.querySelector('#status').textContent='บันทึกในเครื่องแล้ว แต่ส่งไป Google Sheets ไม่สำเร็จ'}});</script></body></html>
