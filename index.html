<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สรุปผู้มุ่งหวังใหม่</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#f4f7fb;color:#172b4d;font:14px Arial,"Noto Sans Thai",sans-serif}
    .app{min-height:100vh;display:flex}.side{width:276px;background:#172f63;color:#fff;padding:28px 20px;flex:none}.brand{display:flex;align-items:center;gap:11px;font-size:16px;font-weight:700;margin:0 9px 42px}.logo{width:40px;height:40px;border-radius:12px;background:#58a6ff;display:grid;place-items:center;font-size:22px}.nav{display:grid;gap:9px}.nav a{color:#cad7f5;text-decoration:none;padding:14px 16px;border-radius:11px;font-weight:600}.nav a.active,.nav a:hover{background:#304d88;color:#fff}.main{width:100%;padding:38px 52px 50px}.eyebrow{margin:0;color:#7e91b2;font-size:12px}.heading{margin:8px 0 22px}.heading h1{margin:0;font-size:29px}.heading p{margin:7px 0 0;color:#7e91b2;font-size:13px}
    .stats{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:16px;margin-bottom:22px}.stat,.card{background:#fff;border:1px solid #e7edf5;border-radius:16px;box-shadow:0 8px 24px #29456b0a}.stat{padding:18px;border-top:4px solid var(--c)}.stat span{display:block;color:var(--c);font-weight:700}.stat b{display:block;font-size:22px;margin:8px 0}.stat small{color:#8a99b0}.blue{--c:#2563eb}.purple{--c:#a855f7}.cyan{--c:#38bdf8}.amber{--c:#f59e0b}.green{--c:#10b981}.pink{--c:#fb7185}
    .card{padding:24px}.card-head{display:flex;justify-content:space-between;gap:20px;align-items:start}.card h2{margin:0;font-size:18px}.card p{margin:6px 0 0;color:#8291a9;font-size:12px}.date{border:1px solid #dbe4f0;border-radius:9px;padding:9px 11px;color:#1f3b66;background:#fff;font:14px Arial}.legend{display:flex;justify-content:flex-end;flex-wrap:wrap;gap:12px;margin:15px 0;color:#62738f;font-size:11px}.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px}.plot{height:280px;display:flex;align-items:end;justify-content:space-around;gap:12px;padding:10px 30px 36px;border-bottom:1px solid #e8eef6;background:repeating-linear-gradient(to bottom,transparent 0 56px,#edf2f7 57px)}.group{height:100%;display:flex;align-items:end;justify-content:center;position:relative;min-width:48px}.bar{width:38px;border-radius:8px 8px 2px 2px;min-height:3px;position:relative;margin:0;transition:height .25s}.bar b{position:absolute;top:-22px;width:100%;text-align:center;font-size:12px}.bar small{position:absolute;top:calc(100% + 9px);width:100%;text-align:center;white-space:nowrap;color:#687993}.empty{margin:auto;color:#8b9ab0}
    .summaries{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px}.mini-plot{height:185px;display:flex;align-items:end;justify-content:space-around;gap:4px;padding:10px 15px 27px;border-bottom:1px solid #e8eef6;background:repeating-linear-gradient(to bottom,transparent 0 45px,#edf2f7 46px)}.mini{width:10px;background:#2563eb;border-radius:5px 5px 1px 1px;min-height:2px;position:relative}.mini small{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);font-size:9px;color:#70809a}.total{margin-top:14px;color:#657694}.total b{color:#1a2d4b}
    @media(max-width:1100px){.side{width:76px}.brand span:not(.logo),.nav span{display:none}.main{padding:30px}.stats{grid-template-columns:repeat(3,1fr)}}@media(max-width:700px){.side{display:none}.main{padding:22px 15px}.stats{grid-template-columns:repeat(2,1fr);gap:10px}.summaries{grid-template-columns:1fr}.plot{padding-inline:8px}.bar{width:26px}}
  </style>
</head>
<body>
  <script src="remote-store.js"></script>
  <div class="app">
    <aside class="side"><div class="brand"><span class="logo">S</span><span>สรุปผู้มุ่งหวังใหม่</span></div><nav class="nav"><a class="active" href="index.html">▦ <span>ภาพรวม</span></a><a href="data-entry.html">▣ <span>บันทึกข้อมูล</span></a><a href="edit-data.html">✎ <span>แก้ไขข้อมูล</span></a></nav></aside>
    <main class="main"><p class="eyebrow" id="today"></p><div class="heading"><h1>สรุปผู้มุ่งหวังใหม่</h1><p>สรุปจำนวนผู้มุ่งหวังและผลการติดตามรายวัน</p></div>
      <section class="stats" id="stats"></section>
      <section class="card"><div class="card-head"><div><h2>ผลการติดตามรายวัน</h2><p id="subtitle">ผลการติดตามตามวันที่เลือก</p></div><input id="date" class="date" type="date"></div><div class="legend" id="legend"></div><div class="plot" id="plot"></div></section>
      <section class="summaries"><article class="card"><div class="card-head"><div><h2>สรุปรายสัปดาห์</h2><p>รวมแพลนเป้าหมายรายวันในสัปดาห์ที่เลือก</p></div><input id="week" class="date" type="week"></div><div class="mini-plot" id="weekPlot"></div><div class="total" id="weekTotal"></div></article><article class="card"><div class="card-head"><div><h2>สรุปรายเดือน</h2><p>รวมแพลนเป้าหมายรายวันในเดือนที่เลือก</p></div><input id="month" class="date" type="month"></div><div class="mini-plot" id="monthPlot"></div><div class="total" id="monthTotal"></div></article></section>
    </main>
  </div>
  <script>
    const fields=[['planTarget','แพลนเป้าหมาย','blue'],['old','ผู้มุ่งหวังเดิม','purple'],['newProspect','ผู้มุ่งหวังใหม่','cyan'],['waiting','รอติดตาม','amber'],['closed','ปิดการติดตาม','green'],['notClosed','ยังไม่ปิด','pink']];
    const chartFields=fields.slice(1), dateInput=document.querySelector('#date');
    const records=()=>JSON.parse(localStorage.getItem('sales-flow-records')||'[]');
    const toKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const latest=()=>records().map(row=>row.date).sort().at(-1)||toKey(new Date());
    const weekOf=d=>{const x=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));x.setUTCDate(x.getUTCDate()+4-(x.getUTCDay()||7));const y=new Date(Date.UTC(x.getUTCFullYear(),0,1));return `${x.getUTCFullYear()}-W${String(Math.ceil((((x-y)/86400000)+1)/7)).padStart(2,'0')}`};
    function renderBars(host,dates){const rows=records(),values=dates.map(d=>rows.find(r=>r.date===toKey(d))||{}),max=Math.max(1,...values.map(r=>Number(r.planTarget||0)));host.innerHTML=dates.map((d,i)=>`<i class="mini" style="height:${Math.max(2,Math.round(Number(values[i].planTarget||0)/max*130))}px"><small>${d.getDate()}</small></i>`).join('');return values.reduce((sum,r)=>sum+Number(r.planTarget||0),0)}
    function render(){const row=records().find(r=>r.date===dateInput.value)||{};document.querySelector('#stats').innerHTML=fields.map(([key,label,color])=>`<article class="stat ${color}"><span>${label}</span><b>${Number(row[key]||0)} ราย</b><small>ข้อมูลวันที่เลือก</small></article>`).join('');document.querySelector('#legend').innerHTML=chartFields.map(([,label,color])=>`<span><i class="${color}" style="background:var(--c)"></i>${label}</span>`).join('');const vals=chartFields.map(([key])=>Number(row[key]||0)),max=Math.max(1,...vals);document.querySelector('#plot').innerHTML=chartFields.map(([key,label,color],i)=>`<div class="group"><div class="bar ${color}" style="background:var(--c);height:${Math.max(3,Math.round(vals[i]/max*180))}px"><b>${vals[i]}</b><small>${label.replace('ผู้มุ่งหวัง','')}</small></div></div>`).join('');document.querySelector('#subtitle').textContent=vals.some(Boolean)?'ผลการติดตามตามวันที่เลือก':'ยังไม่มีข้อมูลในวันที่เลือก';const selected=new Date(dateInput.value+'T00:00:00');document.querySelector('#week').value=weekOf(selected);document.querySelector('#month').value=dateInput.value.slice(0,7);renderPeriods();}
    function renderPeriods(){const [y,w]=document.querySelector('#week').value.split('-W').map(Number),jan4=new Date(y,0,4),offset=(jan4.getDay()||7)-1,monday=new Date(y,0,4-offset+(w-1)*7),weekDays=Array.from({length:7},(_,i)=>new Date(y,monday.getMonth(),monday.getDate()+i)),weekSum=renderBars(document.querySelector('#weekPlot'),weekDays);document.querySelector('#weekTotal').innerHTML=`แพลนเป้าหมายรวม <b>${weekSum} ราย</b>`;const [my,mm]=document.querySelector('#month').value.split('-').map(Number),days=Array.from({length:new Date(my,mm,0).getDate()},(_,i)=>new Date(my,mm-1,i+1)),monthSum=renderBars(document.querySelector('#monthPlot'),days);document.querySelector('#monthTotal').innerHTML=`แพลนเป้าหมายรวม <b>${monthSum} ราย</b>`;}
    dateInput.value=latest();document.querySelector('#today').textContent=new Date().toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});dateInput.addEventListener('change',render);document.querySelector('#week').addEventListener('change',renderPeriods);document.querySelector('#month').addEventListener('change',renderPeriods);window.addEventListener('sales-flow-sheet-loaded',e=>{if(!records().some(r=>r.date===dateInput.value))dateInput.value=latest();render();});render();
  </script>
</body>
</html>
