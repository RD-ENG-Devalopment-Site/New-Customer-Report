<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>แก้ไขข้อมูล</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#172b4d;font:14px Arial,"Noto Sans Thai",sans-serif}.app{min-height:100vh;display:flex}.side{width:276px;background:#172f63;padding:28px 20px;color:#fff}.brand{display:flex;gap:10px;align-items:center;margin:0 9px 42px;font-weight:bold}.logo{display:grid;place-items:center;width:40px;height:40px;border-radius:12px;background:#58a6ff;font-size:22px}.nav{display:grid;gap:9px}.nav a{padding:14px 16px;border-radius:11px;text-decoration:none;color:#cad7f5;font-weight:bold}.nav a.active,.nav a:hover{background:#304d88;color:#fff}.main{width:100%;padding:40px 52px}.back{color:#3975c9;text-decoration:none}.heading h1{margin:14px 0 5px}.heading p{margin:0 0 22px;color:#7e91b2}.layout{display:grid;grid-template-columns:310px 1fr;gap:20px}.card{background:#fff;border:1px solid #e7edf5;border-radius:16px;padding:25px;box-shadow:0 8px 24px #29456b0a}.card h2{margin:0}.card p{color:#7e91b2}.record{width:100%;text-align:left;border:1px solid #e0e8f2;background:#fff;border-radius:10px;margin-top:10px;padding:12px;cursor:pointer;color:#172b4d}.record.active{border-color:#2563eb;background:#eff6ff}.record b,.record small{display:block}.record small{margin-top:4px;color:#73839b}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px}.field{display:grid;gap:7px;color:#52657f}.field span{font-weight:bold}.field i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;background:var(--c)}.field input{border:1px solid #dce5f0;border-radius:9px;padding:11px;color:#172b4d;font:15px Arial}.blue{--c:#2563eb}.purple{--c:#a855f7}.cyan{--c:#38bdf8}.amber{--c:#f59e0b}.green{--c:#10b981}.pink{--c:#fb7185}.actions{display:flex;align-items:center;gap:12px;margin-top:20px}.btn{border:0;border-radius:9px;background:#2563eb;color:#fff;padding:11px 17px;font-weight:bold;cursor:pointer}.status{color:#71819a;font-size:12px}@media(max-width:900px){.side{display:none}.main{padding:24px 16px}.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}}@media(max-width:480px){.grid{grid-template-columns:1fr}}</style></head>
<body><script src="remote-store.js"></script><div class="app"><aside class="side"><div class="brand"><span class="logo">S</span><span>สรุปผู้มุ่งหวังใหม่</span></div><nav class="nav"><a href="index.html">▦ ภาพรวม</a><a href="data-entry.html">▣ บันทึกข้อมูล</a><a class="active" href="edit-data.html">✎ แก้ไขข้อมูล</a></nav></aside><main class="main"><a class="back" href="index.html">← กลับหน้าสรุป</a><div class="heading"><h1>แก้ไขข้อมูล</h1><p>เลือกวันที่ แล้วแก้ไขจำนวนคนและบันทึกทับรายการเดิม</p></div><section class="layout"><article class="card"><h2>รายการที่บันทึก</h2><p>เลือกวันที่ที่ต้องการแก้ไข</p><div id="list"></div></article><article class="card"><h2 id="title">เลือกข้อมูลเพื่อแก้ไข</h2><p>ข้อมูลที่บันทึกจะอัปเดตบนหน้า Dashboard</p><form id="form"><div class="grid"><label class="field blue"><span><i></i>แพลนเป้าหมาย</span><input name="planTarget" type="number" min="0" value="0" required></label><label class="field"><span>วันที่บันทึก</span><input name="date" type="date" required></label><label class="field purple"><span><i></i>ผู้มุ่งหวังเดิม</span><input name="old" type="number" min="0" value="0" required></label><label class="field cyan"><span><i></i>ผู้มุ่งหวังใหม่</span><input name="newProspect" type="number" min="0" value="0" required></label><label class="field amber"><span><i></i>รอติดตาม</span><input name="waiting" type="number" min="0" value="0" required></label><label class="field green"><span><i></i>ปิดการติดตาม</span><input name="closed" type="number" min="0" value="0" required></label><label class="field pink"><span><i></i>ยังไม่ปิด</span><input name="notClosed" type="number" min="0" value="0" required></label></div><div class="actions"><button class="btn" type="submit">บันทึกการแก้ไข</button><span class="status" id="status">เลือกวันที่จากรายการด้านซ้าย</span></div></form></article></section></main></div><script>const form=document.querySelector('#form'),list=document.querySelector('#list'),keys=['planTarget','old','newProspect','waiting','closed','notClosed'];let selected='';const rows=()=>JSON.parse(localStorage.getItem('sales-flow-records')||'[]');function render(){const data=rows().sort((a,b)=>b.date.localeCompare(a.date));list.innerHTML=data.length?data.map(r=>`<button class="record ${r.date===selected?'active':''}" data-date="${r.date}"><b>${new Date(r.date+'T00:00:00').toLocaleDateString('th-TH',{dateStyle:'medium'})}</b><small>แพลนเป้าหมาย ${Number(r.planTarget||0)} ราย</small></button>`).join(''):'<p>ยังไม่มีข้อมูลบันทึก</p>';document.querySelectorAll('.record').forEach(btn=>btn.addEventListener('click',()=>load(btn.dataset.date)))}function load(date){const row=rows().find(r=>r.date===date);if(!row)return;selected=date;Object.entries(row).forEach(([k,v])=>{if(form.elements[k])form.elements[k].value=v});document.querySelector('#title').textContent='แก้ไขข้อมูลวันที่ '+new Date(date+'T00:00:00').toLocaleDateString('th-TH',{dateStyle:'long'});document.querySelector('#status').textContent='กำลังแก้ไขข้อมูลวันที่เลือก';render()}form.addEventListener('submit',async e=>{e.preventDefault();if(!selected)return;const row=Object.fromEntries(new FormData(form));keys.forEach(k=>row[k]=Math.max(0,Number(row[k])||0));const data=rows().filter(item=>item.date!==selected&&item.date!==row.date);data.push(row);localStorage.setItem('sales-flow-records',JSON.stringify(data));selected=row.date;try{await window.salesFlowRemote.save(row);document.querySelector('#status').textContent='บันทึกการแก้ไขและส่งไป Google Sheets แล้ว'}catch{document.querySelector('#status').textContent='บันทึกในเครื่องแล้ว'}render()});window.addEventListener('sales-flow-sheet-loaded',render);render();</script></body></html>
